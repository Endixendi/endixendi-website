<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Endixendi - Shooter</title>

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/shooter.css">

  <link rel="icon" href="assets/images/kolo.png" type="image/png">
</head>
<body>

  <header>
    <div id="menu-placeholder"></div>
  </header>

  <main>

    <section id="shooter-hero" class="mt-16">
      <div class="card">
        <h1>Shooter Game</h1>
        <p class="lead">Strzelaj do wrogich statków i zdobywaj jak najwięcej punktów! 🚀</p>
      </div>
    </section>

    <section id="shooter-game" class="card mt-22">
      <div class="shooter-container">
        
        <canvas id="gameCanvas"></canvas>

        <div id="score">Wynik: 0</div>

        <div id="heatWrapper">
            <div id="heatLabel">TEMPERATURA DZIAŁA</div>
            <div id="heatBarContainer">
                <div id="heatFillBar"></div>
            </div>
        </div>

        <div id="healthBar">
          <div id="healthFill"></div>
        </div>

        <div id="menu">
          <button id="startBtn" class="btn">Start</button>
        </div>

        <div id="gameOverMenu" class="hidden">
          <h2>Game Over</h2>
          <p>Wynik: <span id="finalScore">0</span></p>
          <button id="restartBtn" class="btn">Zagraj ponownie</button>
        </div>
      </div>
      
      <div class="mobile-controls">
        <button id="leftBtn" class="mobile-btn">&larr;</button>
        <button id="shootBtn" class="mobile-btn">&bull;</button>
        <button id="rightBtn" class="mobile-btn">&rarr;</button>
      </div>
    </section>
    
    <section id="controls" class="card mt-16">
      <div class="controls-grid">
        
        <div class="controls-left">
          <h3>Sterowanie</h3>
          <ul>
            <li>← / → – Przesuń</li>
            <li>Spacja – Strzał (Uwaga na przegrzanie!)</li>
          </ul>
        </div>
        
        <div class="volume-control mt-16">
            <h5>Głośność muzyki</h5>
            <input id="volumeControl" type="range" min="0" max="1" step="0.01" value="0.3">
            
            <h5>Głośność efektów</h5>
            <input id="volumeControl1" type="range" min="0" max="1" step="0.01" value="0.3">
        </div>
    </section>

    <section id="credits" class="card mt-16">
      <p>
        <strong>Muzyka:</strong> pixabay.com<br>
        <strong>Dźwięki:</strong> pixabay.com
      </p>
    </section>

  </main>

  <div id="footer-placeholder"></div>

  <script src="assets/js/shooter.js"></script>
  <script src="assets/js/script.js"></script>
</body>
</html>
