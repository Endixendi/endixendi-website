<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Endixendi - Dino</title>

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dino.css">

  <link rel="icon" href="assets/images/kolo.png" type="image/png">
</head>
<body>

  <header>
    <div id="menu-placeholder"></div>
  </header>

  <main>
    <section id="dino-hero" class="mt-16">
      <div class="card">
        <h1>Dino Game</h1>
        <p class="lead">
          Prosty kwadratowy Dino skacze przez przeszkody 🦖
        </p>
      </div>
    </section>

    <div id="scoreBoard" class="card mt-16">
      Wynik: <span id="score">0</span> | Rekord: <span id="highScore">0</span>
    </div>

    <section id="dino-game" class="card mt-22">
      <div class="dino-container">

        <div class="board-container">
          <canvas id="gameCanvas"></canvas>

          <div class="overlay" id="menu">
            <div class="modal">
              <h2>Dino Game</h2>
              <p>Sterowanie: Spacja</p>
              <button id="startBtn" class="btn">Start</button>
            </div>
          </div>

          <div class="overlay hidden" id="gameOverMenu">
            <div class="modal">
              <h2>Game Over!</h2>
              <p>Wynik: <span id="finalScore">0</span></p>
              <p>Rekord: <span id="finalHighScore">0</span></p>
              <button id="restartBtn" class="btn">Zagraj ponownie</button>
            </div>
          </div>
        </div>

        <div class="mobile-controls">
          <button id="jumpBtn" class="btn">↑ SKOK</button>
        </div>

        <div class="game-footer-controls mt-16">
          <div class="controls-info">
            <h3>Sterowanie</h3>
            <p>Spacja / ↑ – Skok</p>
          </div>

          <div class="volume-settings">
            <div class="volume-item">
              <label for="volumeControl">Głośność muzyki</label>
              <input id="volumeControl" type="range" min="0" max="1" step="0.01" value="0.3">
            </div>
            
            <div class="volume-item">
              <label for="volumeControl1">Głośność efektów</label>
              <input id="volumeControl1" type="range" min="0" max="1" step="0.01" value="0.3">
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="credits" class="card mt-16">
      <p>
        <strong>Muzyka:</strong> Biblioteka YouTube - Stealth - Aakash Gandhi<br>
        <strong>Dźwięki:</strong> pixabay.com
      </p>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="assets/js/dino.js"></script>
  <script src="assets/js/script.js"></script>

</body>
</html>
